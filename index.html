<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar Valor da Instalação</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      text-align: center;
      background: #f5f5f5;
    }
    input, select, button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }
    #popup {
      margin-top: 20px;
      background: white;
      padding: 20px;
      border: 1px solid #ccc;
      display: none;
    }
    #whatsapp {
      display: none;
      margin-top: 20px;
      padding: 15px 30px;
      background: #16c24a;
      color: white;
      font-weight: bold;
      font-size: 18px;
      text-decoration: none;
      border-radius: 5px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h1>Consulte o valor da instalação</h1>
  <p>Informe o bairro e a quantidade de veículos</p>
  <input type="text" id="bairroInput" placeholder="Digite o bairro" />
  <select id="quantidade">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
  <button onclick="verValor()">Ver valor</button>
  <div id="popup"></div>
  <a id="whatsapp" href="https://wa.me/5521969312625" target="_blank">Voltar para o WhatsApp</a>

  <script>
    async function verValor() {
      const input = document.getElementById("bairroInput").value.trim();
      const quantidade = parseInt(document.getElementById("quantidade").value);
      const popup = document.getElementById("popup");
      const whatsapp = document.getElementById("whatsapp");

      popup.style.display = "block";
      whatsapp.style.display = "none";

      if (quantidade > 4) {
        popup.innerHTML = `🚨 Para mais de 4 veículos, fale diretamente com nosso time pelo WhatsApp:<br><strong>(21) 96931-2625</strong>`;
        return;
      }

      const response = await fetch("https://instalacao-por-bairro-gps.vercel.app/bairros.json");
      const data = await response.json();

      const normalizar = str =>
        str.normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().trim();

      const resultado = data.find(entry => normalizar(entry.bairro) === normalizar(input));

      if (resultado) {
        const total = (parseFloat(resultado.valor.replace(",", ".")) * quantidade).toFixed(2).replace(".", ",");
        popup.innerHTML = `✅ ${quantidade} veículo(s) em ${resultado.bairro} = R$ ${total} total`;
        whatsapp.style.display = "inline-block";
      } else {
        popup.innerHTML = `❌ Este bairro não foi encontrado.<br>📌 Verifique se você digitou corretamente o nome do bairro.`;
      }
    }
  </script>
</body>
</html>
