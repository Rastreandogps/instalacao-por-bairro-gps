<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar Valor da Instalação</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      text-align: center;
      background: #f5f5f5;
    }
    input, select, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }
    button {
      background-color: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #218838;
    }
    #popup, #mensalidadeBox, #beneficiosBox {
      display: none;
      margin-top: 20px;
      padding: 20px;
      font-size: 18px;
      border-radius: 8px;
      animation: fadeIn 0.4s ease-in-out;
    }
    .sucesso {
      background: #e6f4ea;
      border: 1px solid #2ecc71;
      color: #2d7d46;
    }
    .erro {
      background: #fdecea;
      border: 1px solid #e74c3c;
      color: #c0392b;
    }
    #whatsapp, #duvidas, #naoEncontrou {
      display: none;
      margin-top: 15px;
    }
    #whatsapp a, #duvidas a, #naoEncontrou a {
      padding: 12px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
    }
    #whatsapp a {
      background-color: #25D366;
      color: white;
    }
    #whatsapp a:hover {
      background-color: #1ebe5d;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }
    #duvidas a {
      background-color: #007BFF;
      color: white;
    }
    #duvidas a:hover {
      background-color: #0056b3;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }
    #naoEncontrou a {
      background-color: #ff9800;
      color: white;
    }
    #naoEncontrou a:hover {
      background-color: #e68a00;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }
    .pulsando {
      font-weight: bold;
      color: #065f46;
      animation: pulse 1.2s infinite;
      display: inline-block;
      margin-top: 10px;
    }
    .pulsando-titulo {
      font-weight: bold;
      color: #000;
      animation: pulse 1.2s infinite;
      display: inline-block;
      margin: 20px 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.03); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    #beneficiosBox {
      text-align: left;
      background-color: #e8f4fd;
      border: 1px solid #2e86de;
      color: #0d3c61;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h1>Consulte o valor da instalação</h1>
  <input type="text" id="bairroInput" placeholder="Digite o bairro do RJ" />
  <input type="number" id="quantidadeInput" placeholder="Quantidade de veículos" min="1" />
  <select id="tipoRastreador">
    <option value="com">Com bloqueio</option>
    <option value="sem">Sem bloqueio</option>
  </select>
  <br>
  <button onclick="verValor()">Ver valor</button>

  <div id="popup"></div>
  <div id="mensalidadeBox"></div>
  <div id="beneficiosBox"></div>

  <div id="whatsapp">
    <a href="https://wa.me/5521969312625?text=Ol%C3%A1!%20Gostaria%20de%20agendar%20minha%20instala%C3%A7%C3%A3o." target="_blank">Clique Aqui e Agende já</a>
  </div>

  <div id="duvidas">
    <a href="https://wa.me/5521980886087?text=Ol%C3%A1!%20Ainda%20tenho%20algumas%20d%C3%BAvidas%20sobre%20o%20rastreador." target="_blank">Ainda tenho dúvidas</a>
  </div>

  <div id="naoEncontrou">
    <a href="https://wa.me/5521969312625?text=Ol%C3%A1!%20N%C3%A3o%20encontrei%20meu%20bairro%20na%20lista.%20Pode%20me%20ajudar?" target="_blank">Não encontrei meu bairro</a>
  </div>

  <div>
    <a href="https://wa.me/5521969312625?text=Ol%C3%A1!%20Gostaria%20de%20agendar%20minha%20instala%C3%A7%C3%A3o." target="_blank">
      <div class="pulsando">Clique Aqui e Agende já</div>
    </a>
  </div>

  <h2 class="pulsando-titulo">Veja como funciona nosso aplicativo na prática:</h2>
  <iframe width="100%" height="315" src="https://www.youtube.com/embed/nB5CC01cGIo" frameborder="0" allowfullscreen></iframe>

  <script>
    async function verValor() {
      const bairroInput = document.getElementById("bairroInput").value.trim();
      const quantidade = parseInt(document.getElementById("quantidadeInput").value) || 1;
      const tipo = document.getElementById("tipoRastreador").value;
      const popup = document.getElementById("popup");
      const mensalidadeBox = document.getElementById("mensalidadeBox");
      const beneficiosBox = document.getElementById("beneficiosBox");
      const whatsapp = document.getElementById("whatsapp");
      const duvidas = document.getElementById("duvidas");
      const naoEncontrou = document.getElementById("naoEncontrou");

      const response = await fetch("https://instalacao-por-bairro-gps.vercel.app/bairros.json");
      const data = await response.json();

      const normalizar = str => str.normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().trim();
      const resultado = data.find(entry => normalizar(entry.bairro) === normalizar(bairroInput));

      popup.style.display = "block";
      whatsapp.style.display = "block";
      duvidas.style.display = "block";
      naoEncontrou.style.display = "block";
      mensalidadeBox.style.display = "block";
      beneficiosBox.style.display = "block";

      if (resultado) {
        const valorInstalacao = parseFloat(resultado.valor) * quantidade;
        popup.className = "sucesso";
        popup.innerHTML = `✅ Valor total da instalação: R$ ${valorInstalacao.toFixed(2)}`;
      } else {
        popup.className = "erro";
        popup.innerHTML = `❌ Este bairro não foi encontrado.<br>📌 Verifique se você digitou corretamente o nome do bairro.<br><br>✍️ <strong>Exemplo</strong>: São Cristóvão, Niterói, Duque de Caxias<br>(Apenas o nome do bairro ou cidade)`;
        mensalidadeBox.style.display = "none";
        beneficiosBox.style.display = "none";
      }
    }
  </script>
</body>
</html>
