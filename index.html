<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar Valor da Instalação</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      text-align: center;
      background: #f5f5f5;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }
    button {
      background-color: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #218838;
    }
    #popup {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: white;
      border: 1px solid #ccc;
      font-size: 18px;
    }
    #whatsapp {
      display: none;
      margin-top: 20px;
    }
    #whatsapp a {
      background-color: #25D366;
      color: white;
      padding: 12px 20px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
    }
    #whatsapp a:hover {
      background-color: #1ebe5d;
    }
  </style>
</head>
<body>
  <h1>Consulte o valor da instalação</h1>
  <input type="text" id="bairroInput" placeholder="Digite o bairro" />
  <input type="number" id="quantidadeInput" placeholder="Quantos veículos?" min="1" value="1" />
  <button onclick="verValor()">Ver valor</button>

  <div id="popup"></div>

  <div id="whatsapp">
    <a href="https://wa.me/5521969312625" target="_blank">Voltar para o WhatsApp</a>
  </div>

  <script>
    async function verValor() {
      const bairroInput = document.getElementById("bairroInput").value.trim();
      const quantidadeInput = parseInt(document.getElementById("quantidadeInput").value);
      const popup = document.getElementById("popup");
      const whatsapp = document.getElementById("whatsapp");

      const response = await fetch("https://instalacao-por-bairro-gps.vercel.app/bairros.json");
      const data = await response.json();

      const normalizar = str =>
        str.normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().trim();

      const resultado = data.find(entry => normalizar(entry.bairro) === normalizar(bairroInput));

      popup.style.display = "block";
      whatsapp.style.display = "block";

      if (resultado) {
        const valorUnitario = parseFloat(resultado.valor.replace(',', '.'));

        if (quantidadeInput > 4) {
          popup.innerHTML = `🚨 Para mais de 4 veículos, fale diretamente com nosso time pelo WhatsApp:<br><strong>(21) 96931-2625</strong>`;
        } else {
          const total = (valorUnitario * quantidadeInput).toFixed(2).replace('.', ',');
          popup.innerHTML = `✅ ${quantidadeInput} veículo(s) em ${resultado.bairro} = <strong>R$ ${total}</strong> total`;
        }
      } else {
        popup.innerHTML = `❌ Este bairro não foi encontrado.<br>📌 Verifique se você digitou corretamente o nome do bairro.`;
      }
    }
  </script>
</body>
</html>
