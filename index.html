<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Instalação</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 30px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }
    #popup {
      margin-top: 20px;
      font-size: 18px;
    }
    #whatsapp {
      margin-top: 20px;
      display: none;
      background: #00cc66;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Consulte o valor da instalação</h1>
  <p>Digite o nome do bairro e a quantidade de veículos:</p>

  <input id="bairroInput" placeholder="Ex: queimados">
  <input id="qtdInput" type="number" min="1" placeholder="Qtd de veículos">

  <button onclick="verValor()">Ver valor</button>

  <div id="popup"></div>
  <button id="whatsapp" onclick="window.location.href='https://wa.me/5521969312625'">Voltar para o WhatsApp</button>

  <script>
    async function verValor() {
      const input = document.getElementById("bairroInput").value.trim();
      const qtd = parseInt(document.getElementById("qtdInput").value.trim());
      const popup = document.getElementById("popup");
      const whatsapp = document.getElementById("whatsapp");

      popup.innerHTML = "";
      whatsapp.style.display = "none";

      if (!input || !qtd || qtd < 1) {
        popup.innerHTML = "❗ Preencha o bairro e a quantidade corretamente.";
        return;
      }

      const response = await fetch("https://instalacao-por-bairro-gps.vercel.app/bairros.json");
      const data = await response.json();

      const normalizar = str => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
      const resultado = data.find(entry => normalizar(entry.bairro) === normalizar(input));

      if (resultado) {
        if (qtd > 4) {
          popup.innerHTML = `🚨 Para mais de 4 veículos, fale diretamente com nosso time pelo WhatsApp: <br><strong>(21) 96931-2625</strong>`;
        } else {
          const total = (parseFloat(resultado.valor.replace(",", ".")) * qtd).toFixed(2).replace(".", ",");
          popup.innerHTML = `✅ ${qtd} veículo(s) em ${resultado.bairro} = R$ ${total} total`;
          whatsapp.style.display = "inline-block";
        }
      } else {
        popup.innerHTML = `❌ Este bairro não foi encontrado.<br>📌 Verifique se você digitou corretamente o nome do bairro.`;
      }
    }
  </script>
</body>
</html>
