<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar Valor da Instalação</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      text-align: center;
      background: #f5f5f5;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
    }
    button {
      background-color: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #218838;
    }
    #popup {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: white;
      border: 1px solid #ccc;
      font-size: 18px;
    }
    #whatsapp {
      display: none;
      margin-top: 20px;
    }
    #whatsapp a {
      background-color: #25D366;
      color: white;
      padding: 12px 20px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
    }
    #whatsapp a:hover {
      background-color: #1ebe5d;
    }
  </style>
</head>
<body>
  <h1>Consulte o valor da instalação</h1>
  <input type="text" id="bairroInput" placeholder="Digite o bairro" />
  <button onclick="verValor()">Ver valor</button>

  <div id="popup"></div>

  <div id="whatsapp">
    <a href="https://wa.me/5521969312625" target="_blank">Voltar para o WhatsApp</a>
  </div>

  <script>
    const bairros = [
      { "bairro": "Duque de Caxias", "valor": "R$ 89,90" },
      { "bairro": "Niterói", "valor": "R$ 89,90" },
      { "bairro": "Copacabana", "valor": "R$ 89,90" },
      { "bairro": "Nova Iguaçu", "valor": "R$ 89,90" },
      // ...adicione seus outros bairros aqui
    ];

    function verValor() {
      const input = document.getElementById("bairroInput").value.trim().toLowerCase();
      const popup = document.getElementById("popup");
      const whatsapp = document.getElementById("whatsapp");

      const resultado = bairros.find(item => item.bairro.toLowerCase() === input);

      if (resultado) {
        popup.innerHTML = `Sua instalação é apenas ${resultado.valor}`;
      } else {
        popup.innerHTML = `❌ Este bairro não foi encontrado.<br>📌 Verifique se você digitou corretamente o nome do bairro.`;
      }

      popup.style.display = "block";
      whatsapp.style.display = "block";
    }
  </script>
</body>
</html>
